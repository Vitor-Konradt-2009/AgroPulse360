{% extends "base.html" %}
{% block content %}
<h2>Solicitar Acesso</h2>
<div class="card" style="max-width:700px;margin:0 auto">
  <form method="post">
    <label>Nome Completo</label>
    <input name="nome" required>
    <label>CPF</label>
    <input name="cpf" placeholder="Opcional">
    <label>Telefone (WhatsApp)</label>
    <input name="telefone" placeholder="Opcional">
    <label>Email</label>
    <input type="email" name="email" required>
    <label>Segmento</label>
    <select name="segmento">
      <option value="agricultura">Agricultura</option>
      <option value="avicultura">Avicultura</option>
      <option value="suinocultura">Suinocultura</option>
      <option value="bovinocultura">Bovinocultura</option>
    </select>
    <label>Cooperativa (Opcional)</label>
    <input name="cooperativa" placeholder="Nome da sua cooperativa">
    <button class="btn btn-pri" type="submit">Solicitar</button>
  </form>
  <p>Já tem uma conta? <a href="{{ url_for('login') }}">Faça login</a></p>
  <p class="muted">Em caso de dúvidas, entre em contato via WhatsApp: <a href="https://wa.me/5511999999999" target="_blank">(11) 99999-9999</a></p>
</div>
{% endblock %}
